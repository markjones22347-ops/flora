<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Executor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="window" id="window">
        <div class="title-bar" id="titleBar">
            <div class="title-bar-left">
                <h1>Flora Executor</h1>
                <span class="version">v1.1.0</span>
            </div>
            <div class="title-bar-right">
                <button class="window-button minimize" id="minimizeBtn" title="Minimize">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button class="window-button close" id="closeBtn" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <nav class="tab-nav">
                <button class="tab-button active" data-tab="script-editor">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Script Editor
                </button>
                <button class="tab-button" data-tab="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Settings
                </button>
                <button class="tab-button" id="discordBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"></path>
                    </svg>
                    Join Discord
                </button>
            </nav>

            <div class="tab-content">
                <div class="tab-panel active" id="script-editor">
                    <div class="editor-container">
                        <textarea id="scriptEditor" placeholder="Enter your Lua script here..."></textarea>
                    </div>
                    <div class="action-bar">
                        <div class="status-indicator" id="statusIndicator">
                            <span class="status-dot"></span>
                            <span class="status-text" id="statusText">Not attached</span>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-secondary" id="attachBtn">Attach</button>
                            <button class="btn btn-secondary" id="detachBtn">Detach</button>
                            <button class="btn btn-secondary" id="clearBtn">Clear</button>
                            <button class="btn btn-primary" id="executeBtn">Execute</button>
                            <button class="btn btn-secondary" id="redirBtn">Redir Console</button>
                        </div>
                    </div>
                </div>

                <div class="tab-panel" id="settings">
                    <div class="settings-container">
                        <div class="setting-item">
                            <label for="alwaysOnTop">Always on Top</label>
                            <div class="toggle-switch">
                                <input type="checkbox" id="alwaysOnTop">
                                <span class="slider"></span>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label for="textSize">Text Size</label>
                            <div class="range-slider">
                                <input type="range" id="textSize" min="10" max="24" value="14" step="0.5">
                                <span class="range-value" id="textSizeValue">14</span>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label for="autoAttach">Auto Attach</label>
                            <div class="toggle-switch">
                                <input type="checkbox" id="autoAttach">
                                <span class="slider"></span>
                            </div>
                        </div>
                        <button class="btn btn-secondary" id="resetSettingsBtn">Reset to Default</button>
                    </div>
                </div>
            </div>

            <div class="log-terminal" id="logTerminal">
                <div class="log-header">
                    <h3>Log Terminal</h3>
                    <button class="toggle-btn" id="toggleLogBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="18 15 12 9 6 15"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="log-content" id="logContent">
                    <div class="log-entry info">Flora Executor v1.1.0 initialized</div>
                </div>
            </div>
        </div>

        <div class="notifications" id="notifications"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
