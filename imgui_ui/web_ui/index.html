<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Executor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="window">
        <div class="title-bar" id="titleBar">
            <div class="title-bar-left">
                <h1>Flora Executor</h1>
                <span class="version">v2.0.0</span>
            </div>
            <div class="title-bar-right">
                <button class="window-button" id="minimizeBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button class="window-button close" id="closeBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>
        
        <div class="content">
            <div class="tab-nav">
                <button class="tab-button active" data-tab="editor">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Editor
                </button>
                <button class="tab-button" data-tab="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </button>
            </div>
            
            <div class="tab-content">
                <div class="tab-panel active" id="editor">
                    <div class="editor-container">
                        <textarea id="scriptEditor" placeholder="Enter your Lua script here..."></textarea>
                    </div>
                    
                    <div class="action-bar">
                        <div class="status-indicator">
                            <div class="status-dot"></div>
                            <span id="statusText">Not attached</span>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-secondary" id="clearBtn">Clear</button>
                            <button class="btn btn-primary" id="executeBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Execute
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="tab-panel" id="settings">
                    <div class="settings-container">
                        <div class="setting-item">
                            <label>Always on Top</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="alwaysOnTop">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <label>Text Size</label>
                            <div class="range-slider">
                                <input type="range" id="textSize" min="10" max="24" value="14">
                                <span class="range-value" id="textSizeValue">14</span>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label>Auto Attach</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="autoAttach">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="btn btn-secondary" id="resetSettingsBtn">Reset Settings</button>
                    </div>
                </div>
            </div>
            
            <div class="log-terminal collapsed" id="logTerminal">
                <div class="log-header" id="toggleLogBtn">
                    <h3>Log Terminal</h3>
                    <button class="toggle-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                </div>
                <div class="log-content" id="logContent"></div>
            </div>
        </div>
    </div>
    
    <div class="notifications" id="notifications"></div>
    
    <script src="script.js"></script>
</body>
</html>
